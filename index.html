<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pay Tracker</title>
<style>
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --ink: #1c1c1a;
    --muted: #6b6b66;
    --faint: #9a9a93;
    --line: #e6e4dc;
    --line-strong: #d3d1c7;
    --accent: #1d5f4a;
    --accent-soft: #e1f0ea;
    --accent-ink: #0f3d2f;
    --danger: #a32d2d;
    --danger-soft: #fceaea;
    --amber: #854f0b;
    --amber-soft: #faeeda;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 1px 2px rgba(28,28,26,0.04), 0 4px 16px rgba(28,28,26,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: 0;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 28px 20px 80px; }
  .brand-header { display: flex; justify-content: center; padding: 8px 0 22px; margin-bottom: 22px; border-bottom: 1px solid var(--line); }
  .brand-logo { width: 280px; max-width: 70%; height: auto; display: block; }
  @media (max-width: 600px) { .brand-logo { width: 220px; } }
  .topbar {
    display: flex; align-items: baseline; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 8px;
  }
  h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .tabs { display: flex; gap: 4px; background: #efede6; padding: 4px; border-radius: var(--radius); width: fit-content; margin-bottom: 24px; }
  .tab {
    border: none; background: transparent; padding: 8px 16px; font-size: 14px;
    font-weight: 500; color: var(--muted); border-radius: 7px; cursor: pointer;
    font-family: inherit; transition: all .12s;
  }
  .tab.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-lg); padding: 22px; margin-bottom: 18px;
    box-shadow: var(--shadow);
  }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .card .hint { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
  select, input[type=text], input[type=number], input[type=password], input[type=date] {
    width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--line-strong); border-radius: var(--radius);
    background: var(--surface); color: var(--ink); transition: border .12s, box-shadow .12s;
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  button.btn {
    font-family: inherit; font-size: 14px; font-weight: 500; padding: 10px 18px;
    border-radius: var(--radius); cursor: pointer; transition: all .12s; border: 1px solid transparent;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-ink); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-ghost { background: transparent; border-color: var(--line-strong); color: var(--ink); }
  .btn-ghost:hover { background: #f3f1ea; }
  .btn-danger { background: transparent; border-color: var(--line-strong); color: var(--danger); }
  .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }

  .counter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
  .counter {
    border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: #fcfbf8;
  }
  .counter .clabel { font-size: 14px; font-weight: 500; }
  .counter .crate { font-size: 12px; color: var(--faint); }
  .stepper { display: flex; align-items: center; gap: 8px; }
  .stepper button {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--line-strong);
    background: var(--surface); font-size: 18px; cursor: pointer; color: var(--ink);
    display: flex; align-items: center; justify-content: center; line-height: 1; font-family: inherit;
  }
  .stepper button:hover { background: #f3f1ea; }
  .stepper .val { min-width: 42px; text-align: center; font-size: 18px; font-weight: 600; }
  .stepper input { width: 64px; text-align: center; padding: 6px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-weight: 600; color: var(--muted); padding: 10px 10px; border-bottom: 1px solid var(--line-strong); white-space: nowrap; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
  td { padding: 11px 10px; border-bottom: 1px solid var(--line); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }
  .total-row td { font-weight: 700; border-top: 2px solid var(--line-strong); background: #fcfbf8; }
  .pay { font-weight: 600; color: var(--accent-ink); font-variant-numeric: tabular-nums; }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .metric { background: var(--accent-soft); border-radius: var(--radius); padding: 14px 16px; }
  .metric .m-label { font-size: 12px; color: var(--accent-ink); font-weight: 500; margin-bottom: 4px; }
  .metric .m-val { font-size: 22px; font-weight: 700; color: var(--accent-ink); font-variant-numeric: tabular-nums; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 12px 22px; border-radius: var(--radius);
    font-size: 14px; opacity: 0; transition: all .25s; pointer-events: none; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .lock-screen { max-width: 360px; margin: 40px auto; }
  .emp-rate-block { border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; background: #fcfbf8; }
  .emp-rate-block .ename { font-weight: 600; font-size: 15px; margin-bottom: 12px; display:flex; justify-content:space-between; align-items:center; }
  .rate-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .rate-field label { font-size: 12px; }
  .rate-field .fixed-note { font-size: 11px; color: var(--faint); margin-top: 4px; }
  .emp-rate-block .emp-head { display:flex; align-items:center; gap:10px; cursor:pointer; flex:1 1 auto; min-width:0; }
  .emp-rate-block .emp-chev { font-size:11px; color:var(--muted); flex:none; width:12px; text-align:center; }
  .emp-rate-block .emp-name-txt { font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:none; }
  .emp-rate-block .emp-meta { font-size:12px; color:var(--faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .emp-rate-block .emp-meta.warn { color:var(--danger); }
  .emp-rate-block.collapsed { padding:12px 16px; }
  .emp-rate-block.collapsed .ename { margin-bottom:0; }
  .rates-toolbar { display:flex; justify-content:flex-end; gap:4px; margin-bottom:10px; }
  .rates-toolbar button { background:none; border:none; color:var(--accent-ink); font-size:13px; cursor:pointer; padding:4px 6px; border-radius:6px; }
  .rates-toolbar button:hover { background:var(--accent-soft); }
  .pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; background: #efede6; color: var(--muted); }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .add-emp { display: flex; gap: 10px; margin-bottom: 18px; }
  .add-emp input { flex: 1; }
  .empty { text-align: center; color: var(--faint); padding: 30px; font-size: 14px; }
  .tag { display:inline-block; font-size:11px; padding:2px 8px; border-radius:6px; background:var(--amber-soft); color:var(--amber); font-weight:500; margin-left:8px;}
  .scroll-x { overflow-x: auto; }
  .savebar { position: sticky; bottom: 0; background: linear-gradient(transparent, var(--bg) 40%); padding: 16px 0 4px; display:flex; gap:10px; justify-content:flex-end; }

  /* ----- pay-period day grid (calendar date picker) ----- */
  .period-nav { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:6px; }
  .period-nav .pn-label { font-weight:600; font-size:15px; font-variant-numeric:tabular-nums; }
  .period-nav button { width:34px; height:34px; border:1px solid var(--line-strong); background:#fff; border-radius:8px; cursor:pointer; font-size:18px; line-height:1; color:var(--ink); }
  .period-nav button:hover:not(:disabled) { background:#f3f1ea; }
  .period-nav button:disabled { opacity:.35; cursor:default; }
  .period-total { font-size:13px; color:var(--muted); }
  .week-grid { display:grid; grid-template-columns: repeat(7, 1fr); gap:6px; }
  .week-grid .dow { font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--faint); text-align:center; padding-bottom:2px; }
  .day-cell { border:1px solid var(--line); border-radius:10px; padding:8px 4px; min-height:60px; cursor:pointer; background:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; transition:border-color .12s, background .12s; }
  .day-cell:hover { border-color:var(--accent); }
  .day-cell .dnum { font-size:15px; font-weight:600; color:var(--ink); }
  .day-cell .damt { font-size:12px; font-weight:600; color:var(--accent-ink); font-variant-numeric:tabular-nums; }
  .day-cell .dempty { font-size:13px; color:var(--faint); }
  .day-cell.logged { background:#f4faf7; }
  .day-cell.today { border-color:var(--accent); }
  .day-cell.today .dnum { color:var(--accent); }
  .day-cell.locked { background:var(--amber-soft); }
  .day-cell.locked .dnum { color:var(--amber); }
  .day-cell.selected { border-color:var(--accent); background:var(--accent-soft); box-shadow:0 0 0 2px var(--accent-soft); }
  @media (max-width:600px){ .day-cell{ min-height:52px; padding:6px 2px; gap:2px; } .day-cell .dnum{font-size:13px;} .day-cell .damt,.day-cell .dempty{font-size:11px;} .week-grid{gap:4px;} }
  .other-box { border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; background:#fcfbf8; }
  .other-fields { display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ---------- config ---------- */
const OWNER_EMAILS = ["sutaria.neil@gmail.com", "ssutaria@houstonrenal.com"];
const NP_EMAIL_DOMAIN = "hrg-np.local";
const isOwnerUser = (u) => !!u && OWNER_EMAILS.includes(String(u.email||"").toLowerCase());
// NPs log in with a username; map it to a fixed internal email for Firebase Auth
const npEmailFor = (username) => String(username||"").trim().toLowerCase().replace(/[^a-z0-9._-]/g,"") + "@" + NP_EMAIL_DOMAIN;
const FIXED = [
  { key: "consults",  label: "Consults",   rate: 60, unit: "ea" },
  { key: "followups", label: "Follow-ups", rate: 30, unit: "ea" },
];
// per-user variable pay types. rate is set per employee in owner panel.
// decimal:true => accept fractional quantities (e.g. 7.5 hrs).
const VARIABLE = [
  { key: "clinic_pts", label: "Clinic Patients",    unit: "patient", decimal: false },
  { key: "perdiem",    label: "Per diem",           unit: "days",  decimal: false },
  { key: "pernote",    label: "Per note",           unit: "notes", decimal: false },
  { key: "clinic_hr",  label: "Clinic hourly",      unit: "hrs",   decimal: true },
  { key: "virtual_hr", label: "Virtual hourly",     unit: "hrs",   decimal: true },
  { key: "hosp_hr",    label: "In-hospital hourly", unit: "hrs",   decimal: true },
];
const ALL_TYPES = [...FIXED, ...VARIABLE];
const isFixed = key => FIXED.some(f => f.key === key);
const isDecimal = key => VARIABLE.some(v => v.key === key && v.decimal);
// dollar value of a counts map for a given employee (per-emp rates for variable types)
const payForCounts = (counts, emp) => ALL_TYPES.reduce((s,t) => {
  const qty = Number((counts||{})[t.key] || 0);
  const rate = isFixed(t.key) ? t.rate : Number(emp && emp.rates ? emp.rates[t.key] : 0) || 0;
  return s + qty*rate;
}, 0);
// round quantities: decimals to 2 places, counts to int
const qtyRound = (key, v) => isDecimal(key) ? Math.round(v*100)/100 : Math.round(v);
const normU = s => String(s||"").trim().toLowerCase();

const money = n => "$" + (Math.round(n * 100) / 100).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
const todayISO = () => new Date().toISOString().slice(0,10);

/* ---------- pay period model ----------
   14-day biweekly. Anchor period: Sun 2026-06-14 .. Sat 2026-06-27, paid Fri 2026-07-03.
   Each subsequent period starts 14 days later; payday is the Friday 6 days after the period ends.
   Lock: a period becomes read-only 72 hours before its payday.                                  */
const PERIOD_ANCHOR_START = "2026-06-14"; // a Sunday
const PERIOD_LEN_DAYS = 14;
const PAYDAY_OFFSET_DAYS = 6;   // period end (Sat) + 6 = Friday payday
const LOCK_LEAD_HOURS = 72;

// parse 'YYYY-MM-DD' as a local date at midnight (avoids UTC shift bugs)
function parseDate(iso) { const [y,m,d] = iso.split("-").map(Number); return new Date(y, m-1, d); }
function fmtISO(dt) { return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function addDays(dt, n) { const x = new Date(dt); x.setDate(x.getDate()+n); return x; }
function fmtShort(iso) { const d = parseDate(iso); return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function fmtShortYr(iso) { const d = parseDate(iso); return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}); }

// which period index contains a given ISO date (can be negative for dates before the anchor)
function periodIndexFor(iso) {
  const anchor = parseDate(PERIOD_ANCHOR_START);
  const target = parseDate(iso);
  const diffDays = Math.floor((target - anchor) / 86400000);
  return Math.floor(diffDays / PERIOD_LEN_DAYS);
}
// build a period object from its index
function periodByIndex(i) {
  const start = addDays(parseDate(PERIOD_ANCHOR_START), i * PERIOD_LEN_DAYS);
  const end = addDays(start, PERIOD_LEN_DAYS - 1);          // inclusive Saturday
  const payday = addDays(end, PAYDAY_OFFSET_DAYS);           // Friday
  const lockAt = new Date(payday); lockAt.setHours(0,0,0,0); lockAt.setHours(lockAt.getHours() - LOCK_LEAD_HOURS);
  return {
    index: i,
    start: fmtISO(start),
    end: fmtISO(end),
    payday: fmtISO(payday),
    lockAt,                                                   // Date object
    label: fmtShort(fmtISO(start)) + " – " + fmtShort(fmtISO(end)),
    paydayLabel: fmtShort(fmtISO(payday)),
  };
}
// is a period locked right now? (auto: 72h before payday)
function isPeriodLocked(p, now = new Date()) { return now >= p.lockAt; }
// combined lock: auto-lock OR owner manual lock
function isPeriodLockedCombined(periodIndex, manualLocks, now = new Date()) {
  if (Array.isArray(manualLocks) && manualLocks.includes(periodIndex)) return true;
  return isPeriodLocked(periodByIndex(periodIndex), now);
}
// is a given ISO date inside any locked period?
function dateInLockedPeriod(iso, manualLocks, now = new Date()) {
  return isPeriodLockedCombined(periodIndexFor(iso), manualLocks, now);
}
// the period index for "today"
function currentPeriodIndex() { return periodIndexFor(todayISO()); }
// a window of selectable periods around now (past `back`, future `fwd`)
function periodList(back = 8, fwd = 2) {
  const c = currentPeriodIndex();
  const out = [];
  for (let i = c + fwd; i >= c - back; i--) out.push(periodByIndex(i));
  return out; // newest first
}

/* ---------- storage layer (Firebase Firestore) ----------
   Stores two documents in collection "paytracker":
     paytracker/employees  -> { value: [...] }
     paytracker/entries    -> { value: [...] }
   sGet/sSet keep the same shape the rest of the app expects,
   so no other code needed to change.                          */
async function sGet(key, fallback) {
  try {
    const ref = window._fs.doc(window._db, "paytracker", key);
    const snap = await window._fs.getDoc(ref);
    if (snap.exists() && snap.data() && "value" in snap.data()) return snap.data().value;
    return fallback;
  } catch (e) { console.error("read failed", e); return fallback; }
}
async function sSet(key, val) {
  try {
    const ref = window._fs.doc(window._db, "paytracker", key);
    await window._fs.setDoc(ref, { value: val });
    return true;
  } catch (e) { console.error("write failed", e); return false; }
}

/* ---------- per-NP entries (collection "paytracker_entries", one doc per auth uid) ----------
   Each NP can read/write only their own doc; the owner can read every doc.
   Document shape matches the rest of the app: { value: [ {id,empId,username,date,counts,other} ] } */
async function loadEntriesForUid(uid) {
  try {
    const ref = window._fs.doc(window._db, "paytracker_entries", uid);
    const snap = await window._fs.getDoc(ref);
    if (snap.exists() && snap.data() && "value" in snap.data()) return snap.data().value || [];
    return [];
  } catch (e) { console.error("entries read failed", e); return []; }
}
async function saveEntriesForUid(uid, val) {
  try {
    const ref = window._fs.doc(window._db, "paytracker_entries", uid);
    await window._fs.setDoc(ref, { value: val });
    return true;
  } catch (e) { console.error("entries write failed", e); return false; }
}
// owner-only: merge every NP's entries, tagging each with the uid doc it came from
async function loadAllEntries() {
  try {
    const snap = await window._fs.getDocs(window._fs.collection(window._db, "paytracker_entries"));
    const all = [];
    snap.forEach(d => {
      const v = (d.data() && d.data().value) || [];
      v.forEach(e => all.push({ ...e, _uid: d.id }));
    });
    return all;
  } catch (e) { console.error("all-entries read failed", e); return []; }
}

/* ---------- public roster of valid usernames (collection "public", doc "usernames") ----------
   Publicly readable (no names/rates — just the list of active usernames) so the login screen
   can refuse anyone who isn't a current employee BEFORE any account is created. Owner-write only. */
async function loadPublicUsernames() {
  try {
    const ref = window._fs.doc(window._db, "public", "usernames");
    const snap = await window._fs.getDoc(ref);
    if (snap.exists() && snap.data() && Array.isArray(snap.data().value)) return snap.data().value;
    return null;
  } catch (e) { return null; }   // missing/denied → fail open (don't lock everyone out before it's seeded)
}
async function savePublicUsernames(list) {
  try {
    const ref = window._fs.doc(window._db, "public", "usernames");
    await window._fs.setDoc(ref, { value: list });
    return true;
  } catch (e) { console.error("usernames write failed", e); return false; }
}

/* ---------- app ---------- */
function App() {
  const [loaded, setLoaded] = useState(false);
  const [authUser, setAuthUser] = useState(undefined);   // undefined=checking, null=signed out, object=signed in
  const [tab, setTab] = useState("entry");
  const [employees, setEmployees] = useState([]); // {id,name,rates:{}}
  const [entries, setEntries] = useState([]);     // owner: everyone's (tagged _uid); NP: just theirs
  const [manualLocks, setManualLocks] = useState([]);
  const [toast, setToast] = useState("");

  const isOwner = isOwnerUser(authUser);
  const uid = authUser ? authUser.uid : null;
  // the signed-in NP's own employee record, matched by their internal login email
  const myEmp = (authUser && !isOwner)
    ? employees.find(e => npEmailFor(e.username) === String(authUser.email||"").toLowerCase())
    : null;

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2200);
  }, []);

  // load the data appropriate to whoever is signed in
  const refresh = useCallback(async (user) => {
    const u = user || (window._auth && window._auth.currentUser);
    if (!u) { setEmployees([]); setEntries([]); setManualLocks([]); return; }
    const emps = await sGet("employees", null);
    const locks = await sGet("manualLocks", []);
    setEmployees(emps && emps.length ? emps : []);
    setManualLocks(Array.isArray(locks) ? locks : []);
    setEntries(isOwnerUser(u) ? await loadAllEntries() : await loadEntriesForUid(u.uid));
  }, []);

  // watch auth state; (re)load data whenever the signed-in user changes
  useEffect(() => {
    if (!window._auth || !window._authfns) { setAuthUser(null); setLoaded(true); return; }
    return window._authfns.onAuthStateChanged(window._auth, async (u) => {
      setAuthUser(u || null);
      await refresh(u);
      setLoaded(true);
    });
  }, [refresh]);

  // re-pull when returning to the tab so each device sees the latest
  useEffect(() => {
    const onFocus = () => { if (window._auth && window._auth.currentUser) refresh(); };
    window.addEventListener("focus", onFocus);
    return () => window.removeEventListener("focus", onFocus);
  }, [refresh]);

  const persistEmployees = useCallback(async (next) => {
    setEmployees(next);
    await sSet("employees", next);
    // keep the public username allow-list in sync so removed staff can't sign in
    await savePublicUsernames(next.map(e => String(e.username||"").trim().toLowerCase()).filter(Boolean));
  }, []);
  const toggleLock = useCallback(async (periodIndex) => {
    const latest = await sGet("manualLocks", []);
    const set = new Set(Array.isArray(latest) ? latest : []);
    if (set.has(periodIndex)) set.delete(periodIndex); else set.add(periodIndex);
    const next = [...set];
    setManualLocks(next);
    await sSet("manualLocks", next);
  }, []);

  // NP upsert: one row per (empId,date) inside this NP's own entries doc
  const upsertEntry = useCallback(async (entry) => {
    if (!uid) return false;
    const latest = await loadEntriesForUid(uid);
    const rest = latest.filter(e => !(e.empId === entry.empId && e.date === entry.date));
    const hasCounts = entry.counts && Object.values(entry.counts).some(v => Number(v) > 0);
    const hasOther = entry.other && Number(entry.other.amount) > 0;
    const hasAny = hasCounts || hasOther;
    const next = hasAny ? [...rest, entry] : rest;
    setEntries(next);
    await saveEntriesForUid(uid, next);
    return hasAny;
  }, [uid]);

  // owner deletes an entry from whichever NP doc it came from (tagged _uid on merge)
  const deleteOwnerEntry = useCallback(async (entry) => {
    if (!entry || !entry._uid) return;
    const latest = await loadEntriesForUid(entry._uid);
    await saveEntriesForUid(entry._uid, latest.filter(e => e.id !== entry.id));
    setEntries(await loadAllEntries());
  }, []);

  const signOutNow = useCallback(async () => {
    try { await window._authfns.signOut(window._auth); } catch (e) {}
    setTab("entry"); showToast("Signed out");
  }, [showToast]);

  if (!loaded) return <div className="wrap"><div className="empty">Loading…</div></div>;

/* ---------- login (NP username / owner email) ---------- */
function LoginScreen({ showToast }) {
  const [mode, setMode] = useState("np");   // "np" | "owner"
  return (
    <div className="card lock-screen">
      {mode === "np" ? <NPLogin showToast={showToast} /> : <OwnerLogin showToast={showToast} />}
      <div style={{height:14}} />
      <button className="btn btn-ghost" style={{width:"100%", fontSize:13}}
        onClick={()=>setMode(mode==="np"?"owner":"np")}>
        {mode==="np" ? "Admin" : "Back to staff sign in"}
      </button>
    </div>
  );
}

// NP login: enter username → first time sets a password, after that signs in
function NPLogin({ showToast }) {
  const [username, setUsername] = useState("");
  const [pw, setPw] = useState("");
  const [stage, setStage] = useState("user");   // "user" | "signin" | "create"
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const email = npEmailFor(username);

  const checkUser = async (e) => {
    if (e) e.preventDefault();
    setErr("");
    const u = String(username||"").trim().toLowerCase();
    if (!u) { setErr("Enter your username."); return; }
    setBusy(true);
    try {
      // hard lockout: only current employees (on the public allow-list) may sign in or set a password
      const roster = await loadPublicUsernames();
      if (Array.isArray(roster) && !roster.includes(u)) {
        setErr("That username isn't set up. Ask the admin to add you.");
        setBusy(false);
        return;
      }
      const methods = await window._authfns.fetchSignInMethodsForEmail(window._auth, email);
      setStage(methods && methods.length ? "signin" : "create");
    } catch (ex) { setStage("signin"); }
    finally { setBusy(false); }
  };
  const doSignIn = async (e) => {
    if (e) e.preventDefault();
    setErr(""); setBusy(true);
    try { await window._authfns.signInWithEmailAndPassword(window._auth, email, pw); }
    catch (ex) { setErr("Wrong password. Try again."); }
    finally { setBusy(false); }
  };
  const doCreate = async (e) => {
    if (e) e.preventDefault();
    setErr("");
    if (pw.length < 6) { setErr("Pick a password of at least 6 characters."); return; }
    setBusy(true);
    try { await window._authfns.createUserWithEmailAndPassword(window._auth, email, pw); showToast("Password set — you're in."); }
    catch (ex) { setErr(ex && ex.code === "auth/email-already-in-use" ? "That username already has a password — go back and sign in." : "Couldn't set up your login."); }
    finally { setBusy(false); }
  };

  if (stage === "user") {
    return (
      <form onSubmit={checkUser}>
        <h2>Staff sign in</h2>
        <p className="hint">Enter your username. First time? You'll set a password next.</p>
        <label>Username</label>
        <input type="text" autoComplete="username" value={username} onChange={e=>setUsername(e.target.value)} placeholder="your username" autoFocus />
        {err && <div className="fixed-note" style={{color:"var(--danger)", marginTop:8}}>{err}</div>}
        <div style={{height:14}} />
        <button type="submit" className="btn btn-primary" style={{width:"100%"}} disabled={busy}>{busy?"Checking…":"Continue"}</button>
      </form>
    );
  }
  const backBtn = (
    <>
      <div style={{height:8}} />
      <button type="button" className="btn btn-ghost" style={{width:"100%"}} onClick={()=>{ setStage("user"); setPw(""); setErr(""); }}>Use a different username</button>
    </>
  );
  if (stage === "signin") {
    return (
      <form onSubmit={doSignIn}>
        <h2>Welcome back</h2>
        <p className="hint">Signing in as <strong>{npEmailFor(username).split("@")[0]}</strong>.</p>
        <input type="text" autoComplete="username" value={npEmailFor(username).split("@")[0]} readOnly style={{display:"none"}} />
        <label>Password</label>
        <input type="password" autoComplete="current-password" value={pw} onChange={e=>setPw(e.target.value)} autoFocus />
        {err && <div className="fixed-note" style={{color:"var(--danger)", marginTop:8}}>{err}</div>}
        <div style={{height:14}} />
        <button type="submit" className="btn btn-primary" style={{width:"100%"}} disabled={busy}>{busy?"Signing in…":"Sign in"}</button>
        {backBtn}
      </form>
    );
  }
  return (
    <form onSubmit={doCreate}>
      <h2>Set your password</h2>
      <p className="hint">First time for <strong>{npEmailFor(username).split("@")[0]}</strong>. Choose a password (6+ characters) — your browser can save it.</p>
      <input type="text" autoComplete="username" value={npEmailFor(username).split("@")[0]} readOnly style={{display:"none"}} />
      <label>New password</label>
      <input type="password" autoComplete="new-password" value={pw} onChange={e=>setPw(e.target.value)} autoFocus />
      {err && <div className="fixed-note" style={{color:"var(--danger)", marginTop:8}}>{err}</div>}
      <div style={{height:14}} />
      <button type="submit" className="btn btn-primary" style={{width:"100%"}} disabled={busy}>{busy?"Setting up…":"Set password & sign in"}</button>
      {backBtn}
    </form>
  );
}

function OwnerLogin({ showToast }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const submit = async (e) => {
    if (e) e.preventDefault();
    setErr(""); setBusy(true);
    try {
      const cred = await window._authfns.signInWithEmailAndPassword(window._auth, email.trim(), pw);
      if (!isOwnerUser(cred.user)) { await window._authfns.signOut(window._auth); setErr("That account isn't an admin."); }
    } catch (ex) { setErr("Wrong email or password."); }
    finally { setBusy(false); }
  };
  return (
    <form onSubmit={submit}>
      <h2>Admin sign in</h2>
      <p className="hint">For pay rates and the full roll-up. Your browser can save this.</p>
      <label>Email</label>
      <input type="email" autoComplete="username" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" autoFocus />
      <div style={{height:12}} />
      <label>Password</label>
      <input type="password" autoComplete="current-password" value={pw} onChange={e=>setPw(e.target.value)} />
      {err && <div className="fixed-note" style={{color:"var(--danger)", marginTop:8}}>{err}</div>}
      <div style={{height:14}} />
      <button type="submit" className="btn btn-primary" style={{width:"100%"}} disabled={busy}>{busy?"Signing in…":"Sign in"}</button>
    </form>
  );
}

/* ---------- entry view ---------- */
function EntryView({ emp, entries, upsertEntry, manualLocks, showToast }) {
  const [date, setDate] = useState(todayISO());
  const [counts, setCounts] = useState({});
  const [periodIdx, setPeriodIdx] = useState(currentPeriodIndex());
  const [otherOn, setOtherOn] = useState(false);     // "Other" one-off pay for the selected day
  const [otherAmt, setOtherAmt] = useState("");
  const [otherNote, setOtherNote] = useState("");

  // is the chosen date inside a period that's already locked?
  const dateLocked = date ? dateInLockedPeriod(date, manualLocks) : false;

  // ----- pay-period grid -----
  const maxPeriodIdx = currentPeriodIndex() + 1;            // can log the upcoming period, not the far future
  const period = periodByIndex(periodIdx);
  const periodDays = Array.from({length: PERIOD_LEN_DAYS}, (_, i) => fmtISO(addDays(parseDate(period.start), i)));
  const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // this employee's saved rows for an ISO day (legacy data may hold >1), and their dollar value
  const dayEntries = (iso) => (emp ? entries.filter(e => e.empId === emp.id && e.date === iso) : []);
  const dayDollars = (iso) => dayEntries(iso).reduce((s,e) => s + payForEntry(emp, e), 0);
  const periodDollars = periodDays.reduce((s,iso) => s + dayDollars(iso), 0);

  // when navigating to another period, pull the selected day into that period
  useEffect(() => {
    if (periodIndexFor(date) !== periodIdx) setDate(period.start);
  }, [periodIdx]);

  // load the selected day's saved counts (merging any legacy duplicate rows) whenever the
  // day or the verified employee changes — so tapping a day shows what's there to edit
  useEffect(() => {
    if (!emp) return;
    const es = dayEntries(date);
    const merged = {};
    es.forEach(e => Object.entries(e.counts || {}).forEach(([k,v]) => {
      merged[k] = (merged[k] || 0) + Number(v || 0);
    }));
    setCounts(merged);
    const withOther = es.find(e => e.other && Number(e.other.amount) > 0);
    if (withOther) { setOtherOn(true); setOtherAmt(String(withOther.other.amount)); setOtherNote(withOther.other.note || ""); }
    else { setOtherOn(false); setOtherAmt(""); setOtherNote(""); }
  }, [date, emp && emp.id]);

  const visibleTypes = emp ? ALL_TYPES.filter(t => {
    if (isFixed(t.key)) return !!emp.fixedEligible;
    const r = emp.rates?.[t.key];
    return r != null && Number(r) > 0;
  }) : [];

  const setCount = (key, raw) => {
    let v = Number(raw);
    if (isNaN(v)) v = 0;
    v = Math.max(0, qtyRound(key, v));
    setCounts(c => ({...c, [key]: v}));
  };

  const liveTotal = (emp ? visibleTypes.reduce((sum,t) => {
    const qty = Number(counts[t.key]||0);
    const rate = isFixed(t.key) ? t.rate : Number(emp.rates?.[t.key]||0);
    return sum + qty*rate;
  }, 0) : 0) + (otherOn && Number(otherAmt) > 0 ? Number(otherAmt) : 0);

  const submit = async () => {
    if (!emp) { showToast("Enter a valid username first"); return; }
    // an "Other" line requires both a positive amount and an explanation
    let other = null;
    if (otherOn) {
      const amt = Number(otherAmt);
      if (!(amt > 0)) { showToast("Enter a dollar amount for the Other line"); return; }
      if (!otherNote.trim()) { showToast("Add a comment explaining the Other amount"); return; }
      other = { amount: Math.round(amt*100)/100, note: otherNote.trim() };
    }
    const hasCounts = Object.values(counts).some(v => Number(v) > 0);
    const existing = dayEntries(date);
    if (!hasCounts && !other && existing.length === 0) { showToast("Enter at least one count or an Other amount"); return; }
    // preserve the existing row's id when editing an already-logged day
    const id = (existing[0] && existing[0].id) || ("e_"+Date.now()+"_"+Math.random().toString(36).slice(2,7));
    const entry = { id, empId: emp.id, username: normU(emp.username), date, counts: {...counts} };
    if (other) entry.other = other;
    const kept = await upsertEntry(entry);
    showToast(kept ? ("Saved · " + money(liveTotal) + " · " + fmtShortYr(date)) : ("Cleared · " + fmtShortYr(date)));
  };

  return (
    <div className="card">
      <h2>Log your work</h2>
      <p className="hint">Logging as <strong>{emp.name}</strong> (@{normU(emp.username)}). Tap a day below to add or edit it.</p>

      {emp && (
        <>
          <div style={{height:22}} />
          <div className="period-nav">
            <div style={{display:"flex", alignItems:"center", gap:10}}>
              <button onClick={()=>setPeriodIdx(i=>i-1)} aria-label="Previous pay period">‹</button>
              <div className="pn-label">{fmtShortYr(period.start)} – {fmtShortYr(period.end)}</div>
              <button onClick={()=>setPeriodIdx(i=>Math.min(maxPeriodIdx, i+1))} disabled={periodIdx>=maxPeriodIdx} aria-label="Next pay period">›</button>
            </div>
            <div className="period-total">This period:<span className="pay" style={{marginLeft:6}}>{money(periodDollars)}</span></div>
          </div>
          <p className="hint" style={{marginTop:0, marginBottom:10}}>Tap a day to add or edit its counts. Payday {period.paydayLabel}.</p>
          <div className="week-grid">
            {DOW.map(d => <div className="dow" key={"dow-"+d}>{d}</div>)}
            {periodDays.map(iso => {
              const logged = dayEntries(iso).length > 0;
              const locked = dateInLockedPeriod(iso, manualLocks);
              const cls = "day-cell"
                + (iso===date ? " selected" : "")
                + (logged ? " logged" : "")
                + (iso===todayISO() ? " today" : "")
                + (locked ? " locked" : "");
              return (
                <div className={cls} key={iso} onClick={()=>setDate(iso)}>
                  <div className="dnum">{parseDate(iso).getDate()}{locked ? " 🔒" : ""}</div>
                  {logged
                    ? <div className="damt">{money(dayDollars(iso))}</div>
                    : <div className="dempty">—</div>}
                </div>
              );
            })}
          </div>
          {dateLocked && (
            <div className="fixed-note" style={{color:"var(--amber)", marginTop:12}}>
              Heads up: {fmtShortYr(date)} is in a pay period that's already locked for payroll. You can still save, but the owner will be notified it came in late.
            </div>
          )}
        </>
      )}

      {emp && visibleTypes.length > 0 && (
        <>
          <div style={{height:18}} />
          <label style={{marginBottom:10}}>
            Counts for {fmtShortYr(date)}{dayEntries(date).length ? " — editing your saved day" : ""}
          </label>
          <div className="counter-grid">
            {visibleTypes.map(t => {
              const rate = isFixed(t.key) ? t.rate : Number(emp.rates?.[t.key]||0);
              const dec = isDecimal(t.key);
              const step = dec ? 0.25 : 1;
              const cur = Number(counts[t.key]||0);
              return (
                <div className="counter" key={t.key}>
                  <div>
                    <div className="clabel">{t.label}</div>
                    <div className="crate">{money(rate)} / {t.unit}</div>
                  </div>
                  <div className="stepper">
                    <button onClick={()=>setCount(t.key, cur - step)}>−</button>
                    <input type="number" value={cur} min="0" step={dec ? "0.25" : "1"}
                      onChange={e=>setCount(t.key, e.target.value)} />
                    <button onClick={()=>setCount(t.key, cur + step)}>+</button>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {emp && visibleTypes.length === 0 && (
        <div className="fixed-note" style={{marginTop:18}}>
          No counted pay types are set up for {emp.name} yet — you can still log an Other amount below, or ask the owner to set your rates.
        </div>
      )}

      {emp && (
        <>
          <div style={{height:18}} />
          <div className="other-box">
            <label style={{display:"flex", alignItems:"center", gap:10, cursor:"pointer", marginBottom:0}}>
              <input type="checkbox" style={{width:"auto", margin:0}}
                checked={otherOn} onChange={e=>setOtherOn(e.target.checked)} />
              <span style={{color:"var(--ink)", fontWeight:500}}>Other — a one-off amount not covered above</span>
            </label>
            {otherOn && (
              <>
                <div className="other-fields">
                  <div style={{maxWidth:200}}>
                    <label>Amount ($)</label>
                    <input type="number" min="0" step="0.01" placeholder="0.00"
                      value={otherAmt} onChange={e=>setOtherAmt(e.target.value)}
                      style={ !(Number(otherAmt) > 0) ? {borderColor:"var(--danger)"} : null } />
                  </div>
                  <div style={{flex:"1 1 220px", minWidth:0}}>
                    <label>Explanation (required)</label>
                    <input type="text" placeholder="What is this for?"
                      value={otherNote} onChange={e=>setOtherNote(e.target.value)}
                      style={ !otherNote.trim() ? {borderColor:"var(--danger)"} : null } />
                  </div>
                </div>
                {(!(Number(otherAmt) > 0) || !otherNote.trim()) && (
                  <div className="fixed-note" style={{color:"var(--danger)", marginTop:8}}>
                    An Other line needs both a dollar amount and an explanation before it can be saved.
                  </div>
                )}
              </>
            )}
          </div>

          <div className="savebar">
            <div style={{alignSelf:"center", marginRight:"auto", fontSize:14, color:"var(--muted)"}}>
              This entry: <span className="pay">{money(liveTotal)}</span>
            </div>
            <button className="btn btn-ghost" onClick={()=>{ setCounts({}); setOtherOn(false); setOtherAmt(""); setOtherNote(""); }}>Clear</button>
            <button className="btn btn-primary" onClick={submit}>Save entry</button>
          </div>
        </>
      )}
    </div>
  );
}

/* ---------- roll-up + CSV ---------- */
function payForEntry(emp, entry) {
  let total = 0;
  for (const t of ALL_TYPES) {
    const qty = Number(entry.counts?.[t.key]||0);
    if (!qty) continue;
    const rate = isFixed(t.key) ? t.rate : Number(emp?.rates?.[t.key]||0);
    total += qty*rate;
  }
  const ov = Number(entry.other?.amount);
  if (ov > 0) total += ov;
  return total;
}

function Rollup({ employees, entries, manualLocks, toggleLock, showToast }) {
  const periods = periodList(10, 2);                 // selectable window
  const [mode, setMode] = useState("period");        // "period" | "day" | "custom"
  const [periodIdx, setPeriodIdx] = useState(currentPeriodIndex());
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");
  const [dayDate, setDayDate] = useState(todayISO());
  const [calY, setCalY] = useState(parseDate(todayISO()).getFullYear());
  const [calM, setCalM] = useState(parseDate(todayISO()).getMonth());   // 0-11

  const selPeriod = periodByIndex(periodIdx);
  const locked = isPeriodLockedCombined(periodIdx, manualLocks);

  // effective date window
  const winFrom = mode === "period" ? selPeriod.start : mode === "day" ? dayDate : from;
  const winTo   = mode === "period" ? selPeriod.end   : mode === "day" ? dayDate : to;

  const filtered = entries.filter(e => {
    if (winFrom && e.date < winFrom) return false;
    if (winTo && e.date > winTo) return false;
    return true;
  });

  const buildRow = (emp, empEntries, removed) => {
    const counts = {};
    let pay = 0;
    let otherAmt = 0;
    const otherNotes = [];
    for (const t of ALL_TYPES) counts[t.key] = 0;
    for (const e of empEntries) {
      for (const t of ALL_TYPES) counts[t.key] += Number(e.counts?.[t.key]||0);
      pay += payForEntry(removed ? null : emp, e);   // removed staff: fixed + Other still count; their variable rates are gone
      const ov = Number(e.other?.amount);
      if (ov > 0) { otherAmt += ov; otherNotes.push({ date: e.date, amount: ov, note: (e.other.note || "").trim() }); }
    }
    return { emp, counts, pay, n: empEntries.length, otherAmt, otherNotes, removed };
  };
  const rows = employees.map(emp => buildRow(emp, filtered.filter(e => e.empId === emp.id), false));
  // include entries from staff who have since been removed (orphaned but still recorded/owed)
  const currentIds = new Set(employees.map(e => e.id));
  const orphanGroups = {};
  filtered.forEach(e => { if (!currentIds.has(e.empId)) (orphanGroups[e.empId] = orphanGroups[e.empId] || []).push(e); });
  Object.entries(orphanGroups).forEach(([id, es]) => {
    rows.push(buildRow({ id, name: ((es[0] && es[0].username) || id) + " (removed)" }, es, true));
  });

  const grand = rows.reduce((s,r)=>s+r.pay,0);
  const totalConsults = rows.reduce((s,r)=>s+r.counts.consults,0);
  const totalFollow = rows.reduce((s,r)=>s+r.counts.followups,0);
  const totalOther = rows.reduce((s,r)=>s+r.otherAmt,0);

  // ----- day-view month calendar -----
  const empById = (id) => employees.find(x=>x.id===id);
  const dayTotal = (iso) => entries.filter(e=>e.date===iso).reduce((s,e)=> s + payForEntry(empById(e.empId), e), 0);
  const calFirst = new Date(calY, calM, 1);
  const calCells = [];
  for (let i=0; i<calFirst.getDay(); i++) calCells.push(null);            // leading blanks
  for (let d=1; d<=new Date(calY, calM+1, 0).getDate(); d++) calCells.push(d);
  const calLabel = calFirst.toLocaleDateString(undefined, {month:"long", year:"numeric"});
  const prevMonth = () => (calM<=0 ? (setCalM(11), setCalY(calY-1)) : setCalM(calM-1));
  const nextMonth = () => (calM>=11 ? (setCalM(0), setCalY(calY+1)) : setCalM(calM+1));

  // late entries: entries inside this window that were created after the period locked
  const lateEntries = mode === "period"
    ? filtered.filter(e => {
        const created = e.id && e.id.startsWith("e_") ? Number(e.id.split("_")[1]) : null;
        return locked && created && created > selPeriod.lockAt.getTime();
      })
    : [];

  const exportADP = () => {
    const header = ["Co Code","Batch ID","File #","Employee Name","Other Earnings Code","Other Earnings Amount","Consults","Follow-ups","Clinic Patients","Per Diem","Per Note","Clinic Hrs","Virtual Hrs","In-Hospital Hrs","Period Start","Period End","Payday"];
    const lines = [header.join(",")];
    const payday = mode === "period" ? selPeriod.payday : "";
    rows.filter(r=>r.pay>0).forEach((r) => {
      const c = r.counts;
      const cell = v => { const s = String(v ?? ""); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; };
      lines.push([
        "", "", "", r.emp.name, "Other", (Math.round(r.pay*100)/100).toFixed(2),
        c.consults, c.followups, c.clinic_pts, c.perdiem, c.pernote, c.clinic_hr, c.virtual_hr, c.hosp_hr,
        winFrom||"", winTo||"", payday
      ].map(cell).join(","));
    });
    const blob = new Blob([lines.join("\n")], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const tag = mode === "period" ? `payday_${selPeriod.payday}` : `${winFrom||"all"}_${winTo||"all"}`;
    a.href = url; a.download = `adp_paydata_${tag}.csv`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  };

  const autoLocked = isPeriodLocked(selPeriod);
  const manualLocked = Array.isArray(manualLocks) && manualLocks.includes(periodIdx);

  return (
    <div className="card">
      <h2>Roll-up</h2>
      <p className="hint">Review by pay period, a single day, or a custom range. Pay periods run Sunday–Saturday (14 days), paid the Friday after close.</p>

      {/* mode toggle */}
      <div className="tabs" style={{marginBottom:18}}>
        <button className={"tab"+(mode==="period"?" active":"")} onClick={()=>setMode("period")}>Pay period</button>
        <button className={"tab"+(mode==="day"?" active":"")} onClick={()=>setMode("day")}>Day</button>
        <button className={"tab"+(mode==="custom"?" active":"")} onClick={()=>setMode("custom")}>Custom range</button>
      </div>

      {mode === "period" && (
        <div style={{marginBottom:18}}>
          <label>Pay period</label>
          <select value={periodIdx} onChange={e=>setPeriodIdx(Number(e.target.value))}>
            {periods.map(p => (
              <option key={p.index} value={p.index}>
                {fmtShortYr(p.start)} – {fmtShortYr(p.end)}  ·  paid {fmtShortYr(p.payday)}
                {p.index === currentPeriodIndex() ? "  (current)" : ""}
              </option>
            ))}
          </select>
          <div style={{display:"flex", alignItems:"center", gap:10, marginTop:10, flexWrap:"wrap"}}>
            <span style={{fontSize:13, color:"var(--muted)"}}>
              Payday <strong>{fmtShortYr(selPeriod.payday)}</strong>
            </span>
            {locked ? (
              <span className="pill" style={{background:"var(--danger-soft)", color:"var(--danger)"}}>
                🔒 Locked{manualLocked ? " (manual)" : autoLocked ? " (72h pre-payday)" : ""}
              </span>
            ) : (
              <span className="pill" style={{background:"var(--accent-soft)", color:"var(--accent-ink)"}}>Open</span>
            )}
            <button className="btn btn-ghost" style={{padding:"5px 12px", fontSize:13}}
              onClick={()=>{ toggleLock(periodIdx); showToast(manualLocked ? "Period unlocked" : "Period locked"); }}>
              {manualLocked ? "Unlock period" : "Lock period now"}
            </button>
          </div>
          {autoLocked && !manualLocked && (
            <div className="fixed-note" style={{marginTop:6}}>
              Auto-locked because it's within 72 hours of payday. New entries dated in this period will be flagged below.
            </div>
          )}
        </div>
      )}

      {mode === "custom" && (
        <div className="row" style={{marginBottom:18}}>
          <div><label>From date</label><input type="date" value={from} onChange={e=>setFrom(e.target.value)} /></div>
          <div><label>To date</label><input type="date" value={to} onChange={e=>setTo(e.target.value)} /></div>
        </div>
      )}

      {mode === "day" && (
        <div style={{marginBottom:18}}>
          <div className="period-nav">
            <div style={{display:"flex", alignItems:"center", gap:10}}>
              <button onClick={prevMonth} aria-label="Previous month">‹</button>
              <div className="pn-label">{calLabel}</div>
              <button onClick={nextMonth} aria-label="Next month">›</button>
            </div>
            <div className="period-total">Showing <span className="pay" style={{marginLeft:6}}>{fmtShortYr(dayDate)}</span></div>
          </div>
          <p className="hint" style={{marginTop:0, marginBottom:10}}>Tap a date to see that day's per-NP breakdown below. Each cell shows the total logged that day.</p>
          <div className="week-grid">
            {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => <div className="dow" key={"cd"+d}>{d}</div>)}
            {calCells.map((d, i) => {
              if (d === null) return <div key={"blank"+i} />;
              const iso = fmtISO(new Date(calY, calM, d));
              const tot = dayTotal(iso);
              const cls = "day-cell" + (iso===dayDate ? " selected" : "") + (tot>0 ? " logged" : "") + (iso===todayISO() ? " today" : "");
              return (
                <div className={cls} key={iso} onClick={()=>setDayDate(iso)}>
                  <div className="dnum">{d}</div>
                  {tot>0 ? <div className="damt">{money(tot)}</div> : <div className="dempty">—</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {lateEntries.length > 0 && (
        <div className="card" style={{background:"var(--danger-soft)", border:"1px solid var(--danger)", marginBottom:18, padding:"12px 16px"}}>
          <div style={{color:"var(--danger)", fontWeight:600, fontSize:14}}>
            ⚠ {lateEntries.length} late {lateEntries.length===1?"entry":"entries"} added after this period locked
          </div>
          <div style={{fontSize:13, color:"var(--danger)", marginTop:4}}>
            These were logged after the lock cutoff and are included in the totals above. Review before paying — someone logged work for a period you may have already processed.
          </div>
        </div>
      )}

      <div className="metric-grid">
        <div className="metric"><div className="m-label">Total payout</div><div className="m-val">{money(grand)}</div></div>
        <div className="metric"><div className="m-label">Consults</div><div className="m-val">{totalConsults}</div></div>
        <div className="metric"><div className="m-label">Follow-ups</div><div className="m-val">{totalFollow}</div></div>
        <div className="metric"><div className="m-label">Entries</div><div className="m-val">{filtered.length}</div></div>
      </div>

      <div className="scroll-x">
        <table>
          <thead>
            <tr>
              <th>Employee</th>
              <th className="num">Cons</th><th className="num">F/U</th>
              <th className="num">Clinic pts</th>
              <th className="num">Per diem</th><th className="num">Notes</th>
              <th className="num">Clinic hr</th><th className="num">Virtual hr</th><th className="num">Hosp hr</th>
              <th className="num">Other</th>
              <th className="num">Pay</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(r => (
              <tr key={r.emp.id}>
                <td>{r.emp.name}</td>
                <td className="num">{r.counts.consults||""}</td>
                <td className="num">{r.counts.followups||""}</td>
                <td className="num">{r.counts.clinic_pts||""}</td>
                <td className="num">{r.counts.perdiem||""}</td>
                <td className="num">{r.counts.pernote||""}</td>
                <td className="num">{r.counts.clinic_hr||""}</td>
                <td className="num">{r.counts.virtual_hr||""}</td>
                <td className="num">{r.counts.hosp_hr||""}</td>
                <td className="num">{r.otherAmt ? money(r.otherAmt) : ""}</td>
                <td className="num pay">{money(r.pay)}</td>
              </tr>
            ))}
            <tr className="total-row">
              <td>Total</td>
              <td className="num">{rows.reduce((s,r)=>s+r.counts.consults,0)}</td>
              <td className="num">{rows.reduce((s,r)=>s+r.counts.followups,0)}</td>
              <td className="num">{rows.reduce((s,r)=>s+r.counts.clinic_pts,0)}</td>
              <td className="num">{rows.reduce((s,r)=>s+r.counts.perdiem,0)}</td>
              <td className="num">{rows.reduce((s,r)=>s+r.counts.pernote,0)}</td>
              <td className="num">{rows.reduce((s,r)=>s+r.counts.clinic_hr,0)}</td>
              <td className="num">{rows.reduce((s,r)=>s+r.counts.virtual_hr,0)}</td>
              <td className="num">{rows.reduce((s,r)=>s+r.counts.hosp_hr,0)}</td>
              <td className="num">{totalOther ? money(totalOther) : ""}</td>
              <td className="num pay">{money(grand)}</td>
            </tr>
          </tbody>
        </table>
      </div>

      {rows.some(r => r.otherNotes.length > 0) && (
        <div className="scroll-x" style={{marginTop:18}}>
          <label style={{marginBottom:8}}>Other adjustments — explanations</label>
          <table>
            <thead>
              <tr><th>Date</th><th>Employee</th><th className="num">Amount</th><th>Explanation</th></tr>
            </thead>
            <tbody>
              {rows.flatMap(r => r.otherNotes.map((o, i) => (
                <tr key={r.emp.id+"-o"+i}>
                  <td style={{whiteSpace:"nowrap"}}>{fmtShortYr(o.date)}</td>
                  <td style={{whiteSpace:"nowrap"}}>{r.emp.name}</td>
                  <td className="num pay">{money(o.amount)}</td>
                  <td>{o.note || "—"}</td>
                </tr>
              )))}
            </tbody>
          </table>
        </div>
      )}

      <div className="actions" style={{marginTop:18}}>
        <button className="btn btn-primary" onClick={exportADP}>Export ADP CSV</button>
        {mode === "period" && <span style={{alignSelf:"center", fontSize:13, color:"var(--muted)"}}>Period & payday auto-filled in the export.</span>}
      </div>
    </div>
  );
}

/* ---------- employees & rates ---------- */
function Rates({ employees, persistEmployees, showToast }) {
  const [draft, setDraft] = useState(() => JSON.parse(JSON.stringify(employees)));
  const [newName, setNewName] = useState("");
  const [openIds, setOpenIds] = useState(() => new Set());   // expanded employee rows; default collapsed
  const dirtyRef = useRef(false);

  useEffect(()=>{ setDraft(JSON.parse(JSON.stringify(employees))); }, [employees]);

  const addEmp = () => {
    const name = newName.trim();
    if (!name) return;
    const id = "emp_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
    const next = [...draft, { id, name, rates: {}, fixedEligible: true }];
    setDraft(next); setNewName(""); dirtyRef.current = true;
    setOpenIds(s => new Set(s).add(id));   // a freshly added employee starts expanded
  };
  const removeEmp = (id) => {
    setDraft(draft.filter(e=>e.id!==id)); dirtyRef.current = true;
  };
  const setRate = (id, key, val) => {
    setDraft(draft.map(e => e.id===id ? {...e, rates:{...e.rates, [key]: val}} : e));
    dirtyRef.current = true;
  };
  const setName = (id, val) => {
    setDraft(draft.map(e => e.id===id ? {...e, name: val} : e));
    dirtyRef.current = true;
  };
  const setUsername = (id, val) => {
    setDraft(draft.map(e => e.id===id ? {...e, username: val} : e));
    dirtyRef.current = true;
  };
  const setFixedElig = (id, val) => {
    setDraft(draft.map(e => e.id===id ? {...e, fixedEligible: val} : e));
    dirtyRef.current = true;
  };
  const toggleOpen = (id) => setOpenIds(s => { const n = new Set(s); if (n.has(id)) n.delete(id); else n.add(id); return n; });
  const expandAll = () => setOpenIds(new Set(draft.map(e=>e.id)));
  const collapseAll = () => setOpenIds(new Set());
  // one-line summary shown when an employee row is collapsed
  const empMeta = (emp) => {
    const u = normU(emp.username);
    const nRates = VARIABLE.filter(t => Number(emp.rates?.[t.key]) > 0).length;
    const bits = [];
    if (emp.fixedEligible) bits.push("consults+FU");
    if (nRates) bits.push(nRates + " rate" + (nRates===1?"":"s"));
    return { user: u ? "@"+u : "needs username", right: bits.length ? bits.join(" · ") : "no pay set", warn: !u };
  };
  const save = async () => {
    const named = draft.filter(e => e.name.trim());
    // validation: every employee needs a username, and usernames must be unique (normalized)
    const missing = named.filter(e => !normU(e.username));
    if (missing.length) { showToast("Every employee needs a username (" + missing[0].name.trim() + " is missing one)"); return; }
    const seen = {};
    for (const e of named) {
      const u = normU(e.username);
      if (seen[u]) { showToast('Username "'+u+'" is used by two people — make it unique'); return; }
      seen[u] = true;
    }
    const clean = named.map(e => {
      const rates = {};
      for (const t of VARIABLE) {
        const v = e.rates?.[t.key];
        if (v !== "" && v != null && !isNaN(Number(v)) && Number(v) > 0) rates[t.key] = Number(v);
      }
      return { ...e, name: e.name.trim(), username: normU(e.username), rates, fixedEligible: !!e.fixedEligible };
    });
    await persistEmployees(clean);
    dirtyRef.current = false;
    showToast("Saved");
  };

  return (
    <div className="card">
      <h2>Employees &amp; pay rates</h2>
      <p className="hint">Give each person a unique username — that's what they type to log entries. Consults ($60) and follow-ups ($30) are fixed; toggle eligibility per person. Set variable rates below — leave a field blank or 0 and that pay type won't appear in their entry screen.</p>

      <div className="add-emp">
        <input type="text" placeholder="Add employee name…" value={newName}
          onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEmp()} />
        <button className="btn btn-ghost" onClick={addEmp}>Add</button>
      </div>

      {draft.length===0 && <div className="empty">No employees yet. Add your first staff member above.</div>}

      {draft.length>1 && (
        <div className="rates-toolbar">
          <button onClick={expandAll}>Expand all</button>
          <button onClick={collapseAll}>Collapse all</button>
        </div>
      )}

      {draft.map(emp => {
        const open = openIds.has(emp.id);
        const meta = empMeta(emp);
        return (
        <div className={"emp-rate-block" + (open ? " open" : " collapsed")} key={emp.id}>
          <div className="ename">
            <div className="emp-head" onClick={()=>toggleOpen(emp.id)}>
              <span className="emp-chev">{open ? "▾" : "▸"}</span>
              <span className="emp-name-txt">{(emp.name && emp.name.trim()) || "Unnamed employee"}</span>
              {!open && <span className={"emp-meta"+(meta.warn?" warn":"")}>{meta.user} · {meta.right}</span>}
            </div>
            {open && <button className="btn btn-danger" onClick={()=>removeEmp(emp.id)}>Remove</button>}
          </div>
          {open && (
            <>
              <div style={{margin:"12px 0 14px"}}>
                <label>Name</label>
                <input type="text" value={emp.name} onChange={e=>setName(emp.id, e.target.value)}
                  style={{maxWidth:260, fontWeight:600}} />
              </div>
              <div style={{marginBottom:14}}>
                <label>Username (what they type to log in)</label>
                <input type="text" value={emp.username ?? ""} autoComplete="off"
                  placeholder="e.g. tiffany"
                  onChange={e=>setUsername(emp.id, e.target.value)}
                  style={{maxWidth:260, ...(emp.username && draft.filter(x=>normU(x.username)===normU(emp.username)).length>1 ? {borderColor:"var(--danger)"} : {})}} />
                {emp.username && draft.filter(x=>normU(x.username)===normU(emp.username)).length>1 && (
                  <div className="fixed-note" style={{color:"var(--danger)", marginTop:4}}>Duplicate — this username is used by someone else.</div>
                )}
              </div>
              <div style={{marginBottom:14, paddingBottom:14, borderBottom:"1px solid var(--line)"}}>
                <label style={{display:"flex", alignItems:"center", gap:10, cursor:"pointer", marginBottom:0}}>
                  <input type="checkbox" style={{width:"auto", margin:0}}
                    checked={!!emp.fixedEligible}
                    onChange={e=>setFixedElig(emp.id, e.target.checked)} />
                  <span style={{color:"var(--ink)", fontWeight:500}}>
                    Eligible for consults ($60) &amp; follow-ups ($30)
                  </span>
                </label>
                <div className="fixed-note" style={{marginLeft:28, marginTop:4}}>
                  Leave unchecked for clinic staff — those tiles won't show in their entry screen.
                </div>
              </div>
              <div className="rate-grid">
                {VARIABLE.map(t => (
                  <div className="rate-field" key={t.key}>
                    <label>{t.label} ($/{t.unit})</label>
                    <input type="number" min="0" step="0.01" placeholder="0"
                      value={emp.rates?.[t.key] ?? ""}
                      onChange={e=>setRate(emp.id, t.key, e.target.value)} />
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
        );
      })}

      {draft.length>0 && (
        <div className="actions" style={{justifyContent:"flex-end"}}>
          <button className="btn btn-primary" onClick={save}>Save changes</button>
        </div>
      )}
    </div>
  );
}

/* ---------- all entries (audit / delete) ---------- */
function AllEntries({ employees, entries, deleteEntry, showToast }) {
  const nameOf = e => { const m = employees.find(x=>x.id===e.empId); return m ? m.name : (e.username ? e.username + " (removed)" : "—"); };
  const sorted = [...entries].sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));

  const del = async (entry) => {
    await deleteEntry(entry);
    showToast("Entry deleted");
  };

  const summarize = (entry) => {
    const parts = ALL_TYPES.filter(t => Number(entry.counts?.[t.key]||0) > 0)
      .map(t => `${entry.counts[t.key]} ${t.label.toLowerCase()}`);
    if (entry.other && Number(entry.other.amount) > 0)
      parts.push(`Other ${money(entry.other.amount)}${entry.other.note ? " ("+entry.other.note+")" : ""}`);
    return parts.join(", ") || "—";
  };

  if (!entries.length) return <div className="card"><div className="empty">No entries logged yet.</div></div>;

  return (
    <div className="card">
      <h2>All entries</h2>
      <p className="hint">Every logged entry. Delete any mistakes here.</p>
      <div className="scroll-x">
        <table>
          <thead><tr><th>Date</th><th>Employee</th><th>Logged</th><th className="num">Pay</th><th></th></tr></thead>
          <tbody>
            {sorted.map(e => {
              const emp = employees.find(x=>x.id===e.empId);
              return (
                <tr key={(e._uid||"")+e.id}>
                  <td style={{whiteSpace:"nowrap"}}>{e.date}</td>
                  <td>{nameOf(e)}</td>
                  <td style={{color:"var(--muted)"}}>{summarize(e)}</td>
                  <td className="num pay">{money(payForEntry(emp, e))}</td>
                  <td style={{textAlign:"right"}}><button className="btn btn-danger" style={{padding:"5px 12px"}} onClick={()=>del(e)}>Delete</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function mountApp() {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}
if (window._firebaseReady) {
  mountApp();
} else {
  window.addEventListener("firebase-ready", mountApp, { once: true });
  // safety: if firebase never signals within 8s, show a clear message
  setTimeout(() => {
    if (!window._firebaseReady) {
      document.getElementById("root").innerHTML =
        '<div style="max-width:560px;margin:60px auto;padding:24px;border:1px solid #e6e4dc;border-radius:14px;font-family:-apple-system,sans-serif;color:#1c1c1a;background:#fff;">' +
        '<h2 style="margin:0 0 8px;font-size:18px;">Can\u2019t reach the database</h2>' +
        '<p style="margin:0;color:#6b6b66;line-height:1.5;">The Firebase config at the top of this file is missing or incorrect, so data can\u2019t load. Double-check that you pasted your own Firebase config values (no <code>PASTE_</code> placeholders left).</p></div>';
    }
  }, 8000);
}
</script>
